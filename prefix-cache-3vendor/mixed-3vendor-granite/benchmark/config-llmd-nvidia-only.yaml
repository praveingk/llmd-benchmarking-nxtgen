endpoint:
  stack_name: &stack_name llmd-nvidia-only-granite
  model: &model ibm-granite/granite-4.1-8b
  namespace: &namespace llm-d-granite-mixed-kv
  base_url: &url http://precise-granite-mixed-epp.llm-d-granite-mixed-kv.svc.cluster.local:8081
  hf_token_secret: llm-d-hf-token

control:
  work_dir: $HOME/llm-d-bench-work-nvidia-only-llmd
  kubectl: kubectl

harness:
  name: &harness_name inference-perf
  namespace: *namespace
  parallelism: 1
  wait_timeout: 6000
  image: ghcr.io/llm-d/llm-d-benchmark:v0.5.2
  results_pvc: ""

env:
  - name: RAYON_NUM_THREADS
    value: "4"

workload:
  shared_prefix:
    load:
      type: poisson
      stages:
      # Warmup — seat residents on 4 H100-NVL
      - rate: 15
        duration: 50
      # Main ladder; mirrors 2.1 (rates 3..30) and extends to 50 qps to match
      # the new gaudi-only / mixed-3vendor experiments.
      - rate: 3
        duration: 20
      - rate: 10
        duration: 20
      - rate: 15
        duration: 20
      - rate: 20
        duration: 30
      - rate: 25
        duration: 30
      - rate: 30
        duration: 30
      - rate: 35
        duration: 30
      - rate: 40
        duration: 30
      - rate: 50
        duration: 30
    api:
      type: completion
      streaming: true
    server:
      type: vllm
      model_name: *model
      base_url: *url
      ignore_eos: true
    tokenizer:
      pretrained_model_name_or_path: *model
    data:
      type: shared_prefix
      shared_prefix:
        num_groups: 150
        num_prompts_per_group: 5
        system_prompt_len: 6000
        question_len: 1200
        output_len: 1000
        enable_multi_turn_chat: false
    report:
      request_lifecycle:
        summary: true
        per_stage: true
        per_request: true
    storage:
      local_storage:
        path: /workspace
