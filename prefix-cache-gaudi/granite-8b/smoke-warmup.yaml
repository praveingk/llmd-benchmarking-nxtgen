apiVersion: v1
kind: Pod
metadata:
  name: gaudi-vllm-smoke-warmup
  namespace: llm-d-granite-kv
  labels:
    app: gaudi-vllm-smoke-warmup
spec:
  nodeSelector:
    habana.ai/device.type: GAUDI3
  restartPolicy: Never
  containers:
    - name: vllm
      image: ghcr.io/llm-d/llm-d-hpu:v0.7.0
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -x
          echo "=== Habana visible ==="
          ls /dev/accel 2>&1 || true
          ls -la /sys/class/accel/ 2>&1 || true
          echo "=== HBM info (pre-start) ==="
          hl-smi 2>&1 | head -30 || true
          echo "=== Start vllm (warmup ENABLED, exponential bucketing constrained) ==="
          # v0.7.0 uses exponential bucketing — derived from engine flags below,
          # NOT from VLLM_*_BUCKET_* envs (those are warned-and-overridden).
          # Workload: ~6k system + ~1.2k question = ~7.2k ISL, 1k OSL.
          exec vllm serve ibm-granite/granite-4.1-8b \
            --host 0.0.0.0 \
            --port 8000 \
            --tensor-parallel-size 1 \
            --block-size 16 \
            --dtype bfloat16 \
            --max-model-len 9216 \
            --max-num-seqs 64 \
            --max-num-batched-tokens 16384 \
            --gpu-memory-utilization 0.75
      env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: HOME
          value: /tmp
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: llm-d-hf-token
              key: HF_TOKEN
        - name: PT_HPU_LAZY_MODE
          value: "1"
        - name: PT_HPU_ENABLE_LAZY_COLLECTIVES
          value: "true"
        - name: VLLM_GRAPH_RESERVED_MEM
          value: "0.15"
        - name: VLLM_BUILD
          value: "1.23.0.695"
        - name: VLLM_LOGGING_LEVEL
          value: INFO
      resources:
        limits:
          habana.ai/gaudi: 1
          cpu: "16"
          memory: 96Gi
        requests:
          habana.ai/gaudi: 1
          cpu: "8"
          memory: 48Gi
      ports:
        - containerPort: 8000
          name: vllm
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
        - name: habana-logs
          mountPath: /var/log/habana_logs
      startupProbe:
        httpGet:
          path: /v1/models
          port: vllm
        initialDelaySeconds: 60
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 120
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 20Gi
    - name: habana-logs
      emptyDir: {}
