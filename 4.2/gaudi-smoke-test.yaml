apiVersion: v1
kind: Pod
metadata:
  name: gaudi-vllm-smoke
  namespace: llm-d-granite-kv
  labels:
    app: gaudi-vllm-smoke
spec:
  nodeSelector:
    habana.ai/device.type: GAUDI3
  containers:
    - name: vllm
      image: ghcr.io/llm-d/llm-d-hpu:v0.6.0
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -x
          # Print env / device visibility for debug
          echo "=== Habana visible ==="
          ls /dev/accel 2>&1 || true
          ls -la /sys/class/accel/ 2>&1 || true
          echo "=== Start vllm ==="
          exec vllm serve ibm-granite/granite-4.1-8b \
            --host 0.0.0.0 \
            --port 8000 \
            --tensor-parallel-size 1 \
            --block-size 16 \
            --dtype bfloat16 \
            --kv-events-config "{\"enable_kv_cache_events\":true,\"publisher\":\"zmq\",\"endpoint\":\"tcp://gaie-kv-events-epp.llm-d-granite-kv.svc.cluster.local:5557\",\"topic\":\"kv@${POD_IP}:8000@ibm-granite/granite-4.1-8b\"}"
      env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: HOME
          value: /tmp
        - name: PT_HPU_LAZY_MODE
          value: "1"
        - name: VLLM_SKIP_WARMUP
          value: "true"
        - name: VLLM_BUILD
          value: "1.23.0.695"
        - name: VLLM_LOGGING_LEVEL
          value: INFO
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: llm-d-hf-token
              key: HF_TOKEN
      resources:
        limits:
          habana.ai/gaudi: 1
          cpu: "16"
          memory: 96Gi
        requests:
          habana.ai/gaudi: 1
          cpu: "8"
          memory: 48Gi
      ports:
        - containerPort: 8000
          name: vllm
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
        - name: habana-logs
          mountPath: /var/log/habana_logs
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 20Gi
    - name: habana-logs
      emptyDir: {}
  restartPolicy: Never
