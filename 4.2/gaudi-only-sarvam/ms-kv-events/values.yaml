multinode: false

modelArtifacts:
  uri: "hf://sarvamai/sarvam-30b"
  name: "sarvamai/sarvam-30b"
  size: 80Gi
  authSecretName: "llm-d-hf-token"
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "precise-prefix-cache-aware"
    llm-d.ai/accelerator-variant: "hpu"
    llm-d.ai/accelerator-vendor: "intel-habana"
    llm-d.ai/model: "sarvam-30b"

routing:
  proxy:
    enabled: false

accelerator:
  type: intel-gaudi

decode:
  create: true
  parallelism:
    tensor: 1
    data: 1
  replicas: 8
  nodeSelector:
    habana.ai/device.type: GAUDI3
  monitoring:
    podmonitor:
      enabled: false
  containers:
    - name: "vllm"
      image: ghcr.io/llm-d/llm-d-hpu:v0.7.0
      modelCommand: custom
      command:
        - /bin/sh
        - "-c"
      args:
        - |
          set -x
          # sarvam-30b: 30B MoE, ~60GB bf16 weights, ships custom modeling code.
          # Stack adjustments needed before vllm serve:
          #   1. Upgrade transformers to >=5.0 (image ships 4.57.6, MoE class needs 5.0+)
          #   2. Drop sarvam.py into vllm models dir + register SarvamMoEForCausalLM
          # Both are idempotent (skip if already done) so pod restarts are cheap.
          # HF_HOME points to hostPath cache pre-populated on the gaudi node;
          # mountModelVolume disabled so vllm reads directly from /root/.cache/huggingface.
          # VLLM_SKIP_WARMUP=true: sarvam-MoE warmup is ~2h/pod (sarvam.py MoE path
          # un-fused on HPU); skip pre-compile, absorb cost on first request.
          pip install --quiet --no-cache-dir --upgrade 'transformers>=5.0.0'
          VLLM_DIR=$(python3 -c "import vllm,os; print(os.path.dirname(vllm.__file__))")
          REG="$VLLM_DIR/model_executor/models/registry.py"
          SARVAM="$VLLM_DIR/model_executor/models/sarvam.py"
          if [ ! -f "$SARVAM" ]; then
            curl -sSL -H "Authorization: Bearer $HF_TOKEN" \
              https://huggingface.co/sarvamai/sarvam-30b/resolve/main/sarvam.py \
              -o "$SARVAM"
          fi
          if ! grep -q "SarvamMoEForCausalLM" "$REG"; then
            sed -i 's|^_TEXT_GENERATION_MODELS = {$|&\n    "SarvamMoEForCausalLM": ("sarvam", "SarvamMoEForCausalLM"),\n    "SarvamMLAForCausalLM": ("sarvam", "SarvamMLAForCausalLM"),|' "$REG"
          fi
          exec vllm serve sarvamai/sarvam-30b \
            --host 0.0.0.0 \
            --port 8000 \
            --tensor-parallel-size 1 \
            --block-size 128 \
            --dtype bfloat16 \
            --trust-remote-code \
            --max-model-len 9216 \
            --max-num-seqs 64 \
            --max-num-batched-tokens 16384 \
            --gpu-memory-utilization 0.85 \
            --kv-events-config "{\"enable_kv_cache_events\":true,\"publisher\":\"zmq\",\"endpoint\":\"tcp://gaie-${GAIE_RELEASE_NAME_POSTFIX}-epp.${NAMESPACE}.svc.cluster.local:5557\",\"topic\":\"kv@${POD_IP}:8000@sarvamai/sarvam-30b\"}"
      env:
        - name: GAIE_RELEASE_NAME_POSTFIX
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        # HF_TOKEN auto-injected by chart from modelArtifacts.authSecretName.
        - name: HOME
          value: /tmp
        - name: HF_HOME
          value: /root/.cache/huggingface
        - name: HF_HUB_OFFLINE
          value: "1"
        - name: PT_HPU_LAZY_MODE
          value: "1"
        - name: PT_HPU_ENABLE_LAZY_COLLECTIVES
          value: "true"
        - name: VLLM_BUILD
          value: "1.23.0.695"
        - name: VLLM_GRAPH_RESERVED_MEM
          value: "0.15"
        - name: VLLM_SKIP_WARMUP
          value: "true"
        - name: VLLM_LOGGING_LEVEL
          value: INFO
      ports:
        - containerPort: 8000
          name: vllm
          protocol: TCP
      resources:
        limits:
          cpu: "16"
          memory: 96Gi
        requests:
          cpu: "8"
          memory: 48Gi
      # mountModelVolume: false — using hostPath HF cache (no chart-managed PVC + init download)
      mountModelVolume: false
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
        - name: habana-logs
          mountPath: /var/log/habana_logs
        - name: hf-cache
          mountPath: /root/.cache/huggingface
      startupProbe:
        httpGet:
          path: /v1/models
          port: vllm
        initialDelaySeconds: 60
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 200
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 20
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 20Gi
    - name: habana-logs
      emptyDir: {}
    - name: hf-cache
      hostPath:
        path: /var/lib/llm-d-hf-cache
        type: Directory

prefill:
  create: false
