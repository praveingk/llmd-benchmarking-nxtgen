apiVersion: v1
kind: Pod
metadata:
  name: sarvam-hf-downloader
  namespace: llm-d-granite-kv
spec:
  restartPolicy: Never
  nodeSelector:
    habana.ai/device.type: GAUDI3
  securityContext:
    runAsUser: 0
    runAsGroup: 0
  containers:
    - name: dl
      image: python:3.12-slim
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      env:
        - name: HF_HOME
          value: /cache
        - name: HF_HUB_ENABLE_HF_TRANSFER
          value: "1"
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: llm-d-hf-token
              key: HF_TOKEN
      command: ["sh", "-c"]
      args:
        - |
          set -e
          pip install --quiet --no-cache-dir 'huggingface_hub[hf_xet]>=0.24' hf_transfer
          echo "=== Disk before ==="
          df -h /cache
          echo "=== Downloading sarvamai/sarvam-30b to /cache (HF_HOME) ==="
          T0=$(date +%s)
          hf download sarvamai/sarvam-30b \
            --token "$HF_TOKEN" \
            --max-workers 8
          echo "=== Download took $(($(date +%s) - T0)) seconds ==="
          echo "=== Disk after ==="
          df -h /cache
          echo "=== Cache layout ==="
          ls -la /cache/hub/models--sarvamai--sarvam-30b/snapshots/*/ | head -20
          du -sh /cache/hub/models--sarvamai--sarvam-30b/blobs/ | head
      resources:
        limits:
          cpu: "8"
          memory: 16Gi
        requests:
          cpu: "2"
          memory: 8Gi
      volumeMounts:
        - name: hf-cache
          mountPath: /cache
  volumes:
    - name: hf-cache
      hostPath:
        path: /var/lib/llm-d-hf-cache
        type: Directory
