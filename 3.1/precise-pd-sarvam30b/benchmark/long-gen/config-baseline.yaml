endpoint:
  stack_name: &stack_name baseline-sarvam
  model: &model sarvamai/sarvam-30b
  namespace: &namespace llm-d-pd-sarvam
  base_url: &url http://baseline-svc.llm-d-pd-sarvam.svc.cluster.local:8000
  hf_token_secret: llm-d-hf-token

control:
  work_dir: $HOME/llm-d-bench-work-baseline-long-gen
  kubectl: kubectl

harness:
  name: &harness_name inference-perf
  namespace: *namespace
  parallelism: 1
  wait_timeout: 6000
  image: ghcr.io/llm-d/llm-d-benchmark:v0.5.2
  results_pvc: ""

env:
  - name: RAYON_NUM_THREADS
    value: "4"

# Long-generation profile: exposes decode-side contention.
# ISL ~2k (1500 shared + 500 unique, prefix-cache-friendly), OSL=6000 (reasoning/summarization).
# Rates stay pre-prefill-saturation (≤7) so any loss is attributable to decode interference, not prefill queue.
workload:
  shared_prefix_synthetic:
    load:
      type: constant
      stages:
        - rate: 1
          duration: 60
        - rate: 2
          duration: 60
        - rate: 3
          duration: 60
        - rate: 5
          duration: 60
        - rate: 7
          duration: 60
    api:
      type: completion
      streaming: true
    server:
      type: vllm
      model_name: *model
      base_url: *url
      ignore_eos: true
    tokenizer:
      pretrained_model_name_or_path: *model
    data:
      type: shared_prefix
      shared_prefix:
        num_groups: 32
        num_prompts_per_group: 32
        system_prompt_len: 1500
        question_len: 500
        output_len: 6000
    report:
      request_lifecycle:
        summary: true
        per_stage: true
        per_request: true
    storage:
      local_storage:
        path: /workspace
