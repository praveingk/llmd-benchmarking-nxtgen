endpoint:
  stack_name: &stack_name llmd-pd-sarvam
  model: &model sarvamai/sarvam-30b
  namespace: &namespace llm-d-pd-sarvam
  base_url: &url http://infra-pd-inference-gateway-openshift-ai-inference.llm-d-pd-sarvam.svc.cluster.local:80
  hf_token_secret: llm-d-hf-token

control:
  work_dir: $HOME/llm-d-bench-work-pd-sarvam-dh
  kubectl: kubectl

harness:
  name: &harness_name inference-perf
  namespace: *namespace
  parallelism: 1
  wait_timeout: 6000
  image: ghcr.io/llm-d/llm-d-benchmark:v0.5.2
  results_pvc: ""

env:
  - name: RAYON_NUM_THREADS
    value: "4"

# Decode-heavy profile tuned for 1P:1D on sarvam-30b (30B MoE / 2.4B active), 4×H100 NVL.
# ISL ≈ 2K (1K shared + 1K unique) — single prefill pod (12K tok/s) handles ≤6 QPS.
# OSL = 2000 — long generation, so decode time dominates TTFT; exposes PD's decode-isolation win.
workload:
  shared_prefix_synthetic:
    load:
      type: constant
      stages:
        - rate: 1
          duration: 60
        - rate: 2
          duration: 60
        - rate: 3
          duration: 60
        - rate: 5
          duration: 60
        - rate: 7
          duration: 60
        - rate: 10
          duration: 60
        - rate: 12
          duration: 60
        - rate: 15
          duration: 60
    api:
      type: completion
      streaming: true
    server:
      type: vllm
      model_name: *model
      base_url: *url
      ignore_eos: true
    tokenizer:
      pretrained_model_name_or_path: *model
    data:
      type: shared_prefix
      shared_prefix:
        num_groups: 32
        num_prompts_per_group: 32
        system_prompt_len: 1024
        question_len: 1024
        output_len: 2000
    report:
      request_lifecycle:
        summary: true
        per_stage: true
        per_request: true
    storage:
      local_storage:
        path: /workspace
