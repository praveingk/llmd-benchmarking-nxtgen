serviceAccountOverride: "default"

multinode: false

modelArtifacts:
  uri: "hf://sarvamai/sarvam-30b"
  name: "sarvamai/sarvam-30b"
  size: 200Gi
  authSecretName: "llm-d-hf-token"
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "pd-disaggregation"
    llm-d.ai/accelerator-variant: "gpu"
    llm-d.ai/accelerator-vendor: "nvidia"
    llm-d.ai/model: "sarvam-30b"

routing:
  servicePort: 8000
  proxy:
    image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.7.1
    connector: nixlv2
    secure: false

accelerator:
  type: nvidia

# --- DECODE: 2 replicas, TP=1, one per H100-NVL node (antiAffinity on hostname) ---
decode:
  create: true
  replicas: 2
  parallelism:
    tensor: 1
  nodeSelector:
    nvidia.com/gpu.product: NVIDIA-H100-NVL
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              llm-d.ai/model: sarvam-30b
              llm-d.ai/role: decode
          topologyKey: kubernetes.io/hostname
  podAnnotations:
    k8s.v1.cni.cncf.io/networks: rdma-network
  containers:
    - name: "vllm"
      image: ghcr.io/llm-d/llm-d-cuda:v0.7.0-rc.4
      modelCommand: custom
      command: ["/bin/bash", "-c"]
      args:
        - |
          exec vllm serve sarvamai/sarvam-30b \
            --host 0.0.0.0 \
            --served-model-name sarvamai/sarvam-30b \
            --port 8200 \
            --block-size 128 \
            --max-model-len 32000 \
            --tensor-parallel-size 1 \
            --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both"}' \
            --disable-uvicorn-access-log \
            --trust-remote-code
      env:
        - name: VLLM_NIXL_SIDE_CHANNEL_PORT
          value: "5557"
        - name: VLLM_NIXL_SIDE_CHANNEL_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: UCX_TLS
          value: "^tcp"
        - name: UCX_LOG_LEVEL
          value: "info"
        - name: KSERVE_INFER_ROCE
          value: "false"
        - name: HF_HOME
          value: /root/.cache/huggingface
      ports:
        - containerPort: 8200
          name: vllm
          protocol: TCP
      resources:
        limits:
          cpu: "16"
          memory: 96Gi
          openshift.io/rdma: 1
        requests:
          cpu: "8"
          memory: 48Gi
          openshift.io/rdma: 1
      mountModelVolume: false
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: shm
          mountPath: /dev/shm
        - name: torch-compile-cache
          mountPath: /.cache
        - name: hf-cache
          mountPath: /root/.cache/huggingface
      extraConfig:
        startupProbe:
          httpGet:
            path: /health
            port: 8200
          failureThreshold: 60
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8200
          failureThreshold: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8200
          failureThreshold: 5
          periodSeconds: 30
        securityContext:
          capabilities:
            add:
              - IPC_LOCK
              - SYS_RAWIO
          runAsUser: 0
          runAsGroup: 0
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 20Gi
    - name: metrics-volume
      emptyDir: {}
    - name: torch-compile-cache
      emptyDir: {}
    - name: hf-cache
      hostPath:
        path: /var/lib/llm-d-hf-cache
        type: DirectoryOrCreate

# --- PREFILL: 2 replicas, TP=1, one per H100-NVL node (antiAffinity on hostname) ---
prefill:
  create: true
  replicas: 2
  parallelism:
    tensor: 1
  nodeSelector:
    nvidia.com/gpu.product: NVIDIA-H100-NVL
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              llm-d.ai/model: sarvam-30b
              llm-d.ai/role: prefill
          topologyKey: kubernetes.io/hostname
  podAnnotations:
    k8s.v1.cni.cncf.io/networks: rdma-network
  containers:
    - name: "vllm"
      image: ghcr.io/llm-d/llm-d-cuda:v0.7.0-rc.4
      modelCommand: custom
      command: ["/bin/bash", "-c"]
      args:
        - |
          exec vllm serve sarvamai/sarvam-30b \
            --host 0.0.0.0 \
            --served-model-name sarvamai/sarvam-30b \
            --port 8000 \
            --block-size 128 \
            --max-model-len 32000 \
            --tensor-parallel-size 1 \
            --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both"}' \
            --disable-uvicorn-access-log \
            --trust-remote-code
      env:
        - name: VLLM_NIXL_SIDE_CHANNEL_PORT
          value: "5557"
        - name: VLLM_NIXL_SIDE_CHANNEL_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: UCX_TLS
          value: "^tcp"
        - name: UCX_LOG_LEVEL
          value: "info"
        - name: UCX_PROTO_INFO
          value: "y"
        - name: KSERVE_INFER_ROCE
          value: "false"
        - name: HF_HOME
          value: /root/.cache/huggingface
      ports:
        - containerPort: 8000
          name: vllm
          protocol: TCP
      resources:
        limits:
          cpu: "16"
          memory: 96Gi
          openshift.io/rdma: 1
        requests:
          cpu: "8"
          memory: 48Gi
          openshift.io/rdma: 1
      mountModelVolume: false
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: shm
          mountPath: /dev/shm
        - name: torch-compile-cache
          mountPath: /.cache
        - name: hf-cache
          mountPath: /root/.cache/huggingface
      extraConfig:
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 60
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 5
          periodSeconds: 30
        securityContext:
          capabilities:
            add:
              - IPC_LOCK
              - SYS_RAWIO
          runAsUser: 0
          runAsGroup: 0
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 20Gi
    - name: metrics-volume
      emptyDir: {}
    - name: torch-compile-cache
      emptyDir: {}
