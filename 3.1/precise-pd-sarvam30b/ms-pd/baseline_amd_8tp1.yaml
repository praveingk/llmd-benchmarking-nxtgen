---
apiVersion: v1
kind: Service
metadata:
  name: baseline-svc
  namespace: llm-d-pd-sarvam-amd
  labels:
    app: sarvam-baseline-amd
spec:
  type: ClusterIP
  selector:
    app: sarvam-baseline-amd
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sarvam-baseline-amd
  namespace: llm-d-pd-sarvam-amd
  labels:
    app: sarvam-baseline-amd
spec:
  replicas: 8
  selector:
    matchLabels:
      app: sarvam-baseline-amd
  template:
    metadata:
      labels:
        app: sarvam-baseline-amd
    spec:
      serviceAccountName: default
      nodeSelector:
        feature.node.kubernetes.io/amd-gpu: "true"
      containers:
        - name: vllm
          image: ghcr.io/llm-d/llm-d-rocm:v0.7.0
          command: ["/bin/bash", "-c"]
          args:
            - |
              exec vllm serve sarvamai/sarvam-30b \
                --host 0.0.0.0 \
                --served-model-name sarvamai/sarvam-30b \
                --port 8000 \
                --block-size 128 \
                --max-model-len 32000 \
                --tensor-parallel-size 1 \
                --disable-uvicorn-access-log \
                --trust-remote-code
          env:
            - name: HF_HOME
              value: /root/.cache/huggingface
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          resources:
            limits:
              amd.com/gpu: "1"
              cpu: "8"
              memory: 96Gi
            requests:
              amd.com/gpu: "1"
              cpu: "4"
              memory: 48Gi
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
                - SYS_RAWIO
            runAsUser: 0
            runAsGroup: 0
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 60
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 5
            periodSeconds: 30
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: torch-compile-cache
              mountPath: /.cache
            - name: hf-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 20Gi
        - name: torch-compile-cache
          emptyDir: {}
        - name: hf-cache
          hostPath:
            path: /var/lib/llm-d-hf-cache
            type: DirectoryOrCreate
