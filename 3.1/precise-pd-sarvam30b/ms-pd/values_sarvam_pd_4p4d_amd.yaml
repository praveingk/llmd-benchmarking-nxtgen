serviceAccountOverride: "default"

multinode: false

modelArtifacts:
  uri: "hf://sarvamai/sarvam-30b"
  name: "sarvamai/sarvam-30b"
  size: 200Gi
  authSecretName: "llm-d-hf-token"
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "pd-disaggregation"
    llm-d.ai/accelerator-variant: "gpu"
    llm-d.ai/accelerator-vendor: "amd"
    llm-d.ai/model: "sarvam-30b"

routing:
  servicePort: 8000
  proxy:
    image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.7.1
    connector: nixlv2
    secure: false

accelerator:
  type: amd

# --- DECODE: 4 replicas, TP=1, all on the single MI325X 8-GPU node ---
decode:
  create: true
  replicas: 4
  parallelism:
    tensor: 1
  nodeSelector:
    feature.node.kubernetes.io/amd-gpu: "true"
  containers:
    - name: "vllm"
      image: ghcr.io/llm-d/llm-d-rocm:v0.7.0
      modelCommand: custom
      command: ["/bin/bash", "-c"]
      args:
        - |
          exec vllm serve sarvamai/sarvam-30b \
            --host 0.0.0.0 \
            --served-model-name sarvamai/sarvam-30b \
            --port 8200 \
            --block-size 128 \
            --max-model-len 32000 \
            --tensor-parallel-size 1 \
            --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both"}' \
            --disable-uvicorn-access-log \
            --trust-remote-code
      env:
        - name: VLLM_NIXL_SIDE_CHANNEL_PORT
          value: "5600"
        - name: VLLM_NIXL_SIDE_CHANNEL_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: UCX_TLS
          value: "^cuda"
        - name: UCX_LOG_LEVEL
          value: "info"
        - name: HF_HOME
          value: /root/.cache/huggingface
        - name: HF_HUB_OFFLINE
          value: "1"
      ports:
        - containerPort: 8200
          name: vllm
          protocol: TCP
        - containerPort: 5600
          name: nixl
          protocol: TCP
      resources:
        limits:
          cpu: "16"
          memory: 96Gi
        requests:
          cpu: "8"
          memory: 48Gi
      mountModelVolume: false
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: shm
          mountPath: /dev/shm
        - name: torch-compile-cache
          mountPath: /.cache
        - name: hf-cache
          mountPath: /root/.cache/huggingface
      extraConfig:
        startupProbe:
          httpGet:
            path: /health
            port: 8200
          failureThreshold: 60
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8200
          failureThreshold: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8200
          failureThreshold: 5
          periodSeconds: 30
        securityContext:
          capabilities:
            add:
              - IPC_LOCK
              - SYS_RAWIO
          runAsUser: 0
          runAsGroup: 0
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 20Gi
    - name: metrics-volume
      emptyDir: {}
    - name: torch-compile-cache
      emptyDir: {}
    - name: hf-cache
      hostPath:
        path: /var/lib/llm-d-hf-cache
        type: DirectoryOrCreate

