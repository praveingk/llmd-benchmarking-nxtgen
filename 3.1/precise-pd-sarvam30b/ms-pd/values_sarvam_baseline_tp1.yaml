serviceAccountOverride: "default"

multinode: false

modelArtifacts:
  uri: "hf://sarvamai/sarvam-30b"
  name: "sarvamai/sarvam-30b"
  size: 200Gi
  authSecretName: "llm-d-hf-token"
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "pd-disaggregation"
    llm-d.ai/accelerator-variant: "gpu"
    llm-d.ai/accelerator-vendor: "nvidia"
    llm-d.ai/model: "sarvam-30b"
    llm-d.ai/topology: "monolithic"

routing:
  servicePort: 8000
  proxy:
    enabled: false  # no PD → no routing sidecar

accelerator:
  type: nvidia

# --- DECODE: 4 replicas, TP=1, spread 2-per-node via topology spread constraint ---
decode:
  create: true
  replicas: 4
  parallelism:
    tensor: 1
  nodeSelector:
    nvidia.com/gpu.product: NVIDIA-H100-NVL
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          llm-d.ai/model: sarvam-30b
          llm-d.ai/topology: monolithic
          llm-d.ai/role: decode
  containers:
    - name: "vllm"
      image: ghcr.io/llm-d/llm-d-cuda:v0.7.0-rc.4
      modelCommand: custom
      command: ["/bin/bash", "-c"]
      args:
        - |
          exec vllm serve sarvamai/sarvam-30b \
            --host 0.0.0.0 \
            --served-model-name sarvamai/sarvam-30b \
            --port 8200 \
            --block-size 128 \
            --max-model-len 32000 \
            --tensor-parallel-size 1 \
            --disable-uvicorn-access-log \
            --trust-remote-code
      env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
      ports:
        - containerPort: 8200
          name: vllm
          protocol: TCP
      resources:
        limits:
          cpu: "16"
          memory: 96Gi
        requests:
          cpu: "8"
          memory: 48Gi
      mountModelVolume: true
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: shm
          mountPath: /dev/shm
        - name: torch-compile-cache
          mountPath: /.cache
      extraConfig:
        startupProbe:
          httpGet:
            path: /health
            port: 8200
          failureThreshold: 60
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8200
          failureThreshold: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8200
          failureThreshold: 5
          periodSeconds: 30
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 20Gi
    - name: metrics-volume
      emptyDir: {}
    - name: torch-compile-cache
      emptyDir: {}

prefill:
  create: false
