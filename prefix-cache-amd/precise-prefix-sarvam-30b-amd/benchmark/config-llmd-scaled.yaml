endpoint:
  stack_name: &stack_name llmd-precise-sarvam-scaled
  model: &model sarvamai/sarvam-30b
  namespace: &namespace llm-d-sarvam-kv
  base_url: &url http://precise-sarvam-epp.llm-d-sarvam-kv.svc.cluster.local:8081
  hf_token_secret: llm-d-hf-token

control:
  work_dir: $HOME/llm-d-bench-work-llmd-scaled
  kubectl: kubectl

harness:
  name: &harness_name inference-perf
  namespace: *namespace
  parallelism: 1
  wait_timeout: 6000
  image: ghcr.io/llm-d/llm-d-benchmark:v0.5.2
  results_pvc: ""

env:
  - name: RAYON_NUM_THREADS
    value: "4"

workload:
  shared_prefix:
    load:
      type: poisson
      stages:
      # Warmup — seat residents
      - rate: 15
        duration: 50
      # Main ladder (steps of 25 throughout, up to 200 QPS)
      - rate: 5
        duration: 30
      - rate: 25
        duration: 30
      - rate: 50
        duration: 30
      - rate: 75
        duration: 30
      - rate: 100
        duration: 30
      - rate: 125
        duration: 30
      - rate: 150
        duration: 30
      - rate: 175
        duration: 30
      - rate: 200
        duration: 30
    api:
      type: completion
      streaming: true
    server:
      type: vllm
      model_name: *model
      base_url: *url
      ignore_eos: true
    tokenizer:
      pretrained_model_name_or_path: *model
    data:
      type: shared_prefix
      shared_prefix:
        num_groups: 150
        num_prompts_per_group: 20
        system_prompt_len: 10000
        question_len: 1200
        output_len: 200
        enable_multi_turn_chat: false
    report:
      request_lifecycle:
        summary: true
        per_stage: true
        per_request: true
    storage:
      local_storage:
        path: /workspace
